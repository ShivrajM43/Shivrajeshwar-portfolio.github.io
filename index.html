<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivrajeshwar Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>

/* GLOBAL */
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    cursor: none;
    background: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #020617);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* CUSTOM CURSOR */
.cursor {
    position: fixed;
    width: 15px;
    height: 15px;
    background: cyan;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    box-shadow: 0 0 15px cyan;
}

/* PARTICLES */
#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* HERO */
.hero {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 80px 20px;
    flex-wrap: wrap;
}

.text h1 { font-size: 40px; }
.text span { color: #38bdf8; }

/* BUTTON */
.btn {
    padding: 10px 20px;
    background: #38bdf8;
    border: none;
    border-radius: 20px;
    color: black;
    cursor: pointer;
}

/* PROFILE */
.profile img {
    width: 220px;
    border-radius: 50%;
    border: 4px solid #38bdf8;
    box-shadow: 0 0 20px cyan;
}

/* SOCIAL */
.social i {
    margin: 10px;
    font-size: 20px;
    color: #38bdf8;
}

/* TYPING */
.typing {
    border-right: 2px solid cyan;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 4s steps(30) infinite alternate;
}

@keyframes typing {
    from { width: 0 }
    to { width: 260px }
}

/* GLASS CARDS */
.box, .achieve-card, .project-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,255,255,0.3);
    border-radius: 15px;
    transition: 0.3s;
    padding: 20px;
}

/* HOVER */
.box:hover, .achieve-card:hover, .project-card:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px cyan;
}

/* SKILLS */
.skills {
    padding: 50px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 20px;
}

/* ACHIEVEMENTS */
.achievements {
    padding: 50px;
    text-align: center;
}

/* PROJECTS */
.projects {
    padding: 50px;
    text-align: center;
}

</style>
</head>

<body>

<div class="cursor"></div>
<div id="particles-js"></div>

<section class="hero" data-aos="fade-up">
    <div class="text">
        <h1>Hi There, <br> I'm <span>Shivrajeshwar</span></h1>
        <p class="typing">Robotics & Automation Student</p>

        <div class="social">
            <i class="fab fa-linkedin"></i>
            <i class="fab fa-github"></i>
            <i class="fab fa-youtube"></i>
        </div>
    </div>

    <div class="profile" data-aos="zoom-in">
        <img src="https://via.placeholder.com/220">
    </div>
</section>

<section class="skills" data-aos="fade-right">
    <h2>Skills</h2>
    <div class="grid">
        <div class="box" data-aos="flip-left">🤖 Robotics</div>
        <div class="box" data-aos="flip-left">⚙️ Automation</div>
        <div class="box" data-aos="flip-left">💻 Programming</div>
        <div class="box" data-aos="flip-left">🐍 Python</div>
    </div>
</section>

<section class="achievements" data-aos="fade-up">
    <h2>Achievements</h2>
    <div class="grid">
        <div class="achieve-card" data-aos="zoom-in">🏆 Built Line Follower Robot</div>
        <div class="achieve-card" data-aos="zoom-in">⚙️ Automation Project</div>
    </div>
</section>

<section class="projects" data-aos="fade-left">
    <h2>Projects</h2>
    <div class="grid">
        <div class="project-card" data-aos="fade-up">🤖 Robot Project</div>
        <div class="project-card" data-aos="fade-up">🧠 AI Project</div>
    </div>
</section>

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    color: { value: "#38bdf8" },
    size: { value: 3 },
    move: { speed: 2 }
  }
});
</script>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({ duration: 1000, once: true });
</script>

<!-- CURSOR -->
<script>
const cursor = document.querySelector('.cursor');
document.addEventListener('mousemove', e => {
    cursor.style.top = e.clientY + 'px';
    cursor.style.left = e.clientX + 'px';
});
</script>

</body>
</html>
