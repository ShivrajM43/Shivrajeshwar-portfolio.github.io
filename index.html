<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    cursor: none;
    background: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #020617);
    background-size: 400% 400%;
    animation: bg 10s infinite;
}

@keyframes bg {
    0% {background-position:0%}
    50% {background-position:100%}
    100% {background-position:0%}
}

/* LOADER */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    color: cyan;
    font-size: 30px;
    animation: fadeOut 2s forwards;
    animation-delay: 2s;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* CURSOR */
.cursor {
    position: fixed;
    width: 15px;
    height: 15px;
    background: cyan;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 10px cyan;
    z-index: 999;
}

/* PARTICLES */
#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
}

/* HERO */
.hero {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 80px 20px;
    flex-wrap: wrap;
}

.text h1 {
    font-size: 40px;
    text-shadow: 0 0 10px cyan;
}

.text span {
    color: cyan;
}

/* BUTTON */
.btn {
    padding: 10px 20px;
    background: cyan;
    border: none;
    border-radius: 20px;
    color: black;
    cursor: pointer;
}

.btn:hover {
    box-shadow: 0 0 20px cyan;
    transform: scale(1.05);
}

/* PROFILE */
.profile img {
    width: 220px;
    border-radius: 50%;
    border: 4px solid cyan;
    box-shadow: 0 0 20px cyan;
    animation: float 4s infinite;
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

/* SOCIAL */
.social a {
    margin: 10px;
    font-size: 24px;
    color: cyan;
    display: inline-block;
}

.social a:hover {
    transform: scale(1.2);
    text-shadow: 0 0 10px cyan;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

/* CARDS */
.box, .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid cyan;
    border-radius: 15px;
    padding: 20px;
    transition: 0.3s;
}

.box:hover, .card:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px cyan;
}

/* SECTION */
section {
    padding: 50px;
    text-align: center;
}

h2 {
    color: cyan;
    text-shadow: 0 0 10px cyan;
}

/* VIDEO */
iframe {
    border-radius: 15px;
    box-shadow: 0 0 20px cyan;
}
</style>
</head>

<script>
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";

<script>
